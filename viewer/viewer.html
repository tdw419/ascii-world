<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pxOS Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #fff;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.875rem;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f85149;
            transition: background 0.3s;
        }
        
        .status-indicator.connected {
            background: #3fb950;
        }
        
        .status-text {
            flex: 1;
        }
        
        .last-update {
            color: #8b949e;
            font-family: monospace;
        }
        
        .canvas-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        canvas {
            display: block;
            width: 100%;
            max-width: 480px;
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #0a0a0f;
            border-radius: 4px;
        }
        
        .cell-inspector {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
        }
        
        .cell-inspector h3 {
            font-size: 0.875rem;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .cell-list {
            font-family: monospace;
            font-size: 0.875rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .cell-row {
            display: flex;
            padding: 4px 0;
            border-bottom: 1px solid #21262d;
        }
        
        .cell-row:last-child {
            border-bottom: none;
        }
        
        .cell-key {
            color: #58a6ff;
            min-width: 100px;
        }
        
        .cell-value {
            color: #c9d1d9;
            flex: 1;
        }
        
        .empty-state {
            color: #8b949e;
            font-style: italic;
            padding: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>pxOS Viewer</h1>
        
        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">Connecting...</span>
            <span class="last-update" id="lastUpdate">--:--:--</span>
        </div>
        
        <div class="canvas-container">
            <canvas id="canvas" width="480" height="240"></canvas>
        </div>
        
        <div class="cell-inspector">
            <h3>Cells</h3>
            <div class="cell-list" id="cellList">
                <div class="empty-state">No cells</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const lastUpdate = document.getElementById('lastUpdate');
        const cellList = document.getElementById('cellList');
        
        const WS_URL = `ws://${window.location.hostname || 'localhost'}:3839`;
        const HTTP_URL = `http://${window.location.hostname || 'localhost'}:3839`;
        
        let ws = null;
        let reconnectTimeout = null;
        let cells = {};
        
        function connect() {
            statusText.textContent = 'Connecting...';
            statusIndicator.classList.remove('connected');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    statusIndicator.classList.add('connected');
                    statusText.textContent = 'Connected';
                    renderPNG();
                };
                
                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'cells') {
                            cells = msg.cells || {};
                            updateCellList();
                            updateTimestamp();
                            renderPNG();
                        }
                    } catch (e) {
                        console.error('Parse error:', e);
                    }
                };
                
                ws.onclose = () => {
                    statusIndicator.classList.remove('connected');
                    statusText.textContent = 'Disconnected';
                    scheduleReconnect();
                };
                
                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                    statusText.textContent = 'Connection error';
                };
            } catch (e) {
                console.error('Connect error:', e);
                scheduleReconnect();
            }
        }
        
        function scheduleReconnect() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(() => {
                statusText.textContent = 'Reconnecting...';
                connect();
            }, 2000);
        }
        
        async function renderPNG() {
            try {
                const res = await fetch(`${HTTP_URL}/api/v1/render`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const blob = await res.blob();
                const img = new Image();
                
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(img.src);
                };
                
                img.onerror = () => {
                    console.error('Image load error');
                };
                
                img.src = URL.createObjectURL(blob);
            } catch (e) {
                console.error('Render error:', e);
            }
        }
        
        function updateCellList() {
            const keys = Object.keys(cells);
            
            if (keys.length === 0) {
                cellList.innerHTML = '<div class="empty-state">No cells</div>';
                return;
            }
            
            cellList.innerHTML = keys.sort().map(key => {
                let value = cells[key];
                if (typeof value === 'number') {
                    value = value.toFixed(2);
                }
                return `
                    <div class="cell-row">
                        <span class="cell-key">${escapeHtml(key)}</span>
                        <span class="cell-value">${escapeHtml(String(value))}</span>
                    </div>
                `;
            }).join('');
        }
        
        function updateTimestamp() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            lastUpdate.textContent = time;
        }
        
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        
        // Initial connection
        connect();
    </script>
</body>
</html>
