<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII YouTube</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #30363d;
    }
    h1 { font-size: 1.5rem; color: #f0f6fc; }
    .add-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .add-btn:hover { background: #2ea043; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid #30363d;
    }
    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: #c9d1d9; }
    .tab.active {
      color: #f0f6fc;
      border-bottom-color: #58a6ff;
    }
    .loading { text-align: center; padding: 40px; color: #8b949e; }
    .error { background: #f8514920; border: 1px solid #f85149; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .video-list { list-style: none; }
    .video-item {
      padding: 15px;
      border-bottom: 1px solid #21262d;
    }
    .video-item:hover { background: #161b22; }
    .video-title {
      font-size: 15px;
      margin-bottom: 8px;
      color: #f0f6fc;
    }
    .video-actions { font-size: 13px; }
    .video-actions a {
      color: #58a6ff;
      text-decoration: none;
      margin-right: 15px;
    }
    .video-actions a:hover { text-decoration: underline; }
    .channel-tag {
      font-size: 12px;
      color: #8b949e;
      margin-left: 8px;
    }
    .audio-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      padding: 15px 20px;
      border-top: 1px solid #30363d;
      display: none;
    }
    .audio-player.active { display: block; }
    .audio-player audio { width: 100%; }
    .audio-player .now-playing {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .audio-player .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 18px;
    }
    footer {
      margin-top: 30px;
      padding-top: 15px;
      border-top: 1px solid #30363d;
      font-size: 13px;
      color: #8b949e;
    }
    footer a { color: #58a6ff; text-decoration: none; }
    .sources { margin-top: 10px; }
    .source-tag {
      display: inline-block;
      background: #21262d;
      padding: 3px 8px;
      border-radius: 4px;
      margin-right: 5px;
      font-size: 12px;
    }
    .refresh-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 10px;
    }
    .refresh-btn:hover { background: #30363d; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ASCII YouTube</h1>
      <div>
        <button class="refresh-btn" onclick="refreshCurrentTab()">Refresh</button>
        <button class="add-btn" onclick="addChannel()">+ Add Channel</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="feed" onclick="switchTab('feed')">Feed</button>
      <button class="tab" data-tab="discover" onclick="switchTab('discover')">Discover</button>
    </div>

    <div id="content">
      <div class="loading">Loading feed...</div>
    </div>

    <footer id="footer">
      <div class="sources" id="sources"></div>
    </footer>
  </div>

  <div class="audio-player" id="audioPlayer">
    <button class="close-btn" onclick="closePlayer()">&times;</button>
    <div class="now-playing" id="nowPlaying"></div>
    <audio id="audio" controls autoplay></audio>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentTab = 'feed';

    function switchTab(tab) {
      currentTab = tab;
      // Update tab UI
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      // Load content
      if (tab === 'feed') {
        loadFeed();
      } else {
        loadDiscover();
      }
    }

    function refreshCurrentTab() {
      if (currentTab === 'feed') {
        loadFeed();
      } else {
        loadDiscover();
      }
    }

    async function loadFeed() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading feed...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/youtube/feed`);
        const data = await res.json();

        if (data.message) {
          content.innerHTML = `<div class="error">${data.message}</div>`;
          document.getElementById('sources').innerHTML = '';
          return;
        }

        if (data.videos.length === 0) {
          content.innerHTML = '<div class="loading">No videos found. Add some channels!</div>';
          return;
        }

        renderVideos(data.videos);

        // Update sources footer
        const sourcesRes = await fetch(`${API_BASE}/api/youtube/channels`);
        const sourcesData = await sourcesRes.json();
        document.getElementById('sources').innerHTML =
          'Sources: ' + sourcesData.channels.map(ch =>
            `<span class="source-tag">${ch.name || ch.id}</span>`
          ).join('');
      } catch (err) {
        content.innerHTML = `<div class="error">Failed to load feed: ${err.message}</div>`;
      }
    }

    async function loadDiscover() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Fetching YouTube homepage...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/youtube/discover`);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();

        if (data.videos.length === 0) {
          content.innerHTML = '<div class="loading">No videos found on homepage.</div>';
          return;
        }

        renderVideos(data.videos);
        document.getElementById('sources').innerHTML =
          `<span class="source-tag">youtube.com</span> • Fetched: ${new Date(data.fetched).toLocaleTimeString()}`;
      } catch (err) {
        content.innerHTML = `<div class="error">Failed to discover: ${err.message}</div>`;
      }
    }

    function renderVideos(videos) {
      const content = document.getElementById('content');
      const html = `<ul class="video-list">${
        videos.map(v => `
          <li class="video-item">
            <div class="video-title">
              ${escapeHtml(v.title)}
              <span class="channel-tag">${escapeHtml(v.channel)}</span>
            </div>
            <div class="video-actions">
              <a href="#" onclick="playAudio('${escapeHtml(v.url)}', '${escapeHtml(v.title).replace(/'/g, "\\'")}')">Audio Only</a>
              <a href="${v.url}" target="_blank">Watch on YouTube</a>
            </div>
          </li>
        `).join('')
      }</ul>`;
      content.innerHTML = html;
    }

    async function playAudio(url, title) {
      event.preventDefault();
      const player = document.getElementById('audioPlayer');
      const audio = document.getElementById('audio');
      const nowPlaying = document.getElementById('nowPlaying');

      nowPlaying.textContent = 'Loading: ' + title;
      player.classList.add('active');

      try {
        const res = await fetch(`${API_BASE}/api/youtube/audio?url=${encodeURIComponent(url)}`);
        if (!res.ok) {
          throw new Error('Failed to get audio URL');
        }
        const data = await res.json();
        audio.src = data.audioUrl;
        nowPlaying.textContent = 'Playing: ' + title;
      } catch (err) {
        nowPlaying.textContent = 'Error: ' + err.message;
      }
    }

    function closePlayer() {
      const player = document.getElementById('audioPlayer');
      const audio = document.getElementById('audio');
      audio.pause();
      audio.src = '';
      player.classList.remove('active');
    }

    async function addChannel() {
      const url = prompt('Enter YouTube channel URL:\n(e.g., https://youtube.com/@channelname)');
      if (!url) return;

      try {
        const res = await fetch(`${API_BASE}/api/youtube/channels`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();
        if (data.ok) {
          if (currentTab === 'feed') {
            loadFeed();
          }
        } else {
          alert('Error: ' + (data.error || 'Failed to add channel'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load feed on page load
    loadFeed();
  </script>
</body>
</html>
